<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidden Grid — Pixel Art Preview</title>
<style>
  :root {
    --bg:      #0D1426;
    --surface: #162040;
    --raised:  #1E2E55;
    --empty:   #1A2E5C;
    --filled:  #F5A623;
    --text:    #F0F4FF;
    --muted:   #4E6E9E;
    --accent:  #4F84F5;
    --line:    #0D1426;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 32px 24px 64px;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 40px;
  }
  .section {
    margin-bottom: 48px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent);
    border-bottom: 1px solid var(--raised);
    padding-bottom: 8px;
    margin-bottom: 20px;
  }
  .grid-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
  }
  .puzzle-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .puzzle-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    line-height: 1.3;
  }
  .puzzle-meta {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
  }
  .pixel-grid {
    display: grid;
    gap: 2px;
    background: var(--line);
    border: 2px solid var(--raised);
    border-radius: 4px;
    padding: 2px;
  }
  .pixel {
    border-radius: 1px;
  }
  .pixel.on  { background: var(--filled); }
  .pixel.off { background: var(--empty); }
</style>
</head>

// ─── Group by size ────────────────────────────────────────────────────────────
const SECTIONS = [
  { label: '4 × 4 — Flash',   size: 4  },
  { label: '6 × 6 — Easy',    size: 6  },
  { label: '8 × 8 — Medium',  size: 8  },
  { label: '10 × 10 — Hard',  size: 10 },
  { label: '15 × 15 — Expert',size: 15 },
]

const CATEGORY_EMOJI = {
  Symbols: '🔷', Animals: '🐾', Nature: '🌿',
  Objects: '📦', Space: '🚀', Food: '🍎',
}

// Cell pixel size per grid size
const CELL_PX = { 4: 20, 6: 14, 8: 11, 10: 9, 15: 7 }

// ─── Render ───────────────────────────────────────────────────────────────────
const app = document.body

SECTIONS.forEach(({ label, size }) => {
  const puzzles = PUZZLES.filter(p => p.size === size)
  if (!puzzles.length) return

  const section = document.createElement('div')
  section.className = 'section'

  const title = document.createElement('div')
  title.className = 'section-title'
  title.textContent = `${label}  ·  ${puzzles.length} puzzles`
  section.appendChild(title)

  const wrap = document.createElement('div')
  wrap.className = 'grid-wrap'

  puzzles.forEach(p => {
    const card = document.createElement('div')
    card.className = 'puzzle-card'

    const px = CELL_PX[size] ?? 8
    const gridEl = document.createElement('div')
    gridEl.className = 'pixel-grid'
    gridEl.style.gridTemplateColumns = `repeat(${size}, ${px}px)`

    p.grid.forEach(row => {
      row.forEach(cell => {
        const dot = document.createElement('div')
        dot.className = `pixel ${cell ? 'on' : 'off'}`
        dot.style.width  = `${px}px`
        dot.style.height = `${px}px`
        gridEl.appendChild(dot)
      })
    })

    const titleEl = document.createElement('div')
    titleEl.className = 'puzzle-title'
    titleEl.textContent = p.title

    const metaEl = document.createElement('div')
    metaEl.className = 'puzzle-meta'
    metaEl.textContent = `${CATEGORY_EMOJI[p.category] ?? ''} ${p.category}`

    card.appendChild(gridEl)
    card.appendChild(titleEl)
    card.appendChild(metaEl)
    wrap.appendChild(card)
  })

  section.appendChild(wrap)
  app.appendChild(section)
})
</script>
